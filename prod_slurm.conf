# slurm.conf — InferQueue production, single-node
#
# Architecture summary:
#   - All batch tasks are CPU-only processes that POST inference requests
#     through APIsix to always-on vLLM instances.
#   - Slurm owns NO GPUs. GPU allocation is managed entirely by vLLM.
#   - Three partitions map to completion_window duration:
#
#       batch-high    ≤ 36h window, < 10 requests    Priority 40
#       batch-medium  ≤ 36h window, 10+ requests     Priority 30
#                     also used for 36–72h windows
#       batch-low     > 72h window                   Priority 10
#
#   - All jobs carry a hard --deadline so tasks expire gracefully if they
#     cannot complete within the requested window.
#   - Backpressure is handled at the task level by polling vLLM /metrics
#     directly before each inference POST.
#
# Update NodeName to match your actual hostname and hardware.
# Run `slurmd -C` on the target node to get exact CPU/memory values.

# ── Cluster identity ──────────────────────────────────────────────────────────

ClusterName=inferqueue

# Replace with your actual hostname
SlurmctldHost=llm-node-01

# ── Authentication ────────────────────────────────────────────────────────────

AuthType=auth/munge
CryptoType=crypto/munge

# ── Process tracking ──────────────────────────────────────────────────────────
# linuxproc avoids cgroup requirements for CPU-only task tracking.
# Since tasks just run curl/python3 against the network, cgroup isolation
# adds no value and complicates container-based deployments.

ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

# ── Scheduling ────────────────────────────────────────────────────────────────
# Backfill allows lower-priority jobs to fill idle gaps without blocking
# higher-priority work. multifactor priority weights job size and age so
# small urgent jobs (batch-high) are not starved by large batch-medium jobs.

SchedulerType=sched/backfill
PriorityType=priority/multifactor
PriorityWeightJobSize=100
PriorityWeightAge=10

# ── Node resource selection ───────────────────────────────────────────────────
# CR_CPU: Slurm tracks CPU slots only. Memory is not enforced because tasks
# are lightweight network clients — the real resource constraint is GPU
# availability on the vLLM side, managed by the backpressure logic in
# run_request.sh rather than Slurm.

SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# ── Logging ───────────────────────────────────────────────────────────────────

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid

# Syslog level — set to verbose during initial deployment, then drop to info
SlurmctldDebug=info
SlurmdDebug=info

# ── State persistence ─────────────────────────────────────────────────────────

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd

# ── Ports ─────────────────────────────────────────────────────────────────────

SlurmctldPort=6817
SlurmdPort=6818

# ── Timeouts ─────────────────────────────────────────────────────────────────
# Generous timeouts — batch tasks can legitimately block for minutes in the
# backpressure loop while waiting for GPU capacity.

MessageTimeout=60
SlurmctldTimeout=300
SlurmdTimeout=300

# ── Accounting ────────────────────────────────────────────────────────────────
# Enable accounting so sacct can be used to track job completion, token
# usage correlation, and capacity planning queries.
# Requires slurmdbd running and configured separately.
#
# If you are not running slurmdbd yet, comment these out — the shim falls
# back to squeue-based polling when sacct returns no rows.

AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost
AccountingStoragePort=6819
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

# ── Node definition ───────────────────────────────────────────────────────────
# CPUs should match physical core count — run `slurmd -C` to confirm.
# RealMemory is intentionally set below total RAM to leave headroom for
# the always-on vLLM processes (which are large — allow ~4GB per GPU pair).
# On a 64GB node with 7 GPUs, vLLM alone may consume 40–50GB.
#
# CPU allocation is what actually limits task concurrency here, not memory.
# Set CPUs to match your core count; Slurm will use this to gate how many
# array tasks run simultaneously.
#
# Example for a 32-core / 128GB node:
#   NodeName=llm-node-01 CPUs=32 RealMemory=16000 State=UNKNOWN
#
# Replace llm-node-01 with your actual hostname (must match SlurmctldHost).

NodeName=llm-node-01 CPUs=32 RealMemory=16000 State=UNKNOWN

# ── Partitions ────────────────────────────────────────────────────────────────
#
# batch-high
#   Highest priority. Used for urgent short batches (≤ 36h window, < 10
#   requests). Jobs here should complete within hours under normal load.
#   MaxTime matches the maximum window routed here.
#
# batch-medium
#   Mid priority. Used for larger short batches (≤ 36h, 10+ requests) and
#   relaxed medium batches (36–72h window). Slurm backfills these into
#   gaps left by batch-high work.
#
# batch-low
#   Lowest priority. Used for long deferred batches (> 72h window). Runs
#   entirely opportunistically in idle time — these jobs should never
#   block interactive or batch-high/medium traffic.

PartitionName=batch-high   Nodes=llm-node-01 Priority=40 MaxTime=36:00:00  Default=NO  State=UP PreemptMode=off
PartitionName=batch-medium Nodes=llm-node-01 Priority=30 MaxTime=72:00:00  Default=YES State=UP PreemptMode=off
PartitionName=batch-low    Nodes=llm-node-01 Priority=10 MaxTime=UNLIMITED Default=NO  State=UP PreemptMode=off