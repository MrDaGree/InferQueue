# slurm.conf — devcontainer, Slurm 20.11 (Debian bullseye)
#
# Hostname MUST match docker-compose `hostname: devbox`.
# Slurm owns no GPUs — all tasks are CPU-only processes that POST to vLLM.

ClusterName=dev-cluster
SlurmctldHost=devbox

AuthType=auth/munge
CryptoType=crypto/munge

# linuxproc avoids any cgroup requirement — works in Docker without privileged
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

SchedulerType=sched/backfill
PriorityType=priority/multifactor
PriorityWeightJobSize=100
PriorityWeightAge=10

SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd

SlurmctldPort=6817
SlurmdPort=6818

MessageTimeout=30
SlurmctldTimeout=120
SlurmdTimeout=120

# CPUs set high so array jobs don't queue waiting for slots
NodeName=devbox CPUs=4 RealMemory=5925 State=UNKNOWN

PartitionName=batch-high   Nodes=devbox Priority=40 MaxTime=36:00:00  Default=NO  State=UP
PartitionName=batch-medium Nodes=devbox Priority=30 MaxTime=72:00:00  Default=YES State=UP
PartitionName=batch-low    Nodes=devbox Priority=10 MaxTime=UNLIMITED Default=NO  State=UP